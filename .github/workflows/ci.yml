name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import check
        run: python -c "import ingestor, clusterer, labeller; print('All imports OK')"

      - name: Cluster sample log
        run: python main.py tests/sample_auth.log --no-ai -k 5
